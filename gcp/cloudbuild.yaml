# Phase 13 — CI/CD.  Git push -> Cloud Build -> image -> Artifact Registry -> Cloud Run.
#
# The application source is upstream (koala73/worldmonitor); this repo holds the
# deploy config. Point this build at the app source via the _APP_SOURCE_REPO
# substitution (a `git clone` step), or run it from within an app checkout.
#
# Wire it up with a Cloud Build trigger (console or gcloud):
#   gcloud builds triggers create github \
#     --repo-name=worldmonitor --repo-owner=koala73 \
#     --branch-pattern='^main$' \
#     --build-config=gcp/cloudbuild.yaml
#
# Runs as the uvm-cloud-build service account (see gcp/terraform/iam.tf).

substitutions:
  _REGION: us-central1
  _REPO: universe-monitor
  _SERVICE: uvm-backend         # primary Cloud Run service to roll the new image to
  _APP_SOURCE_REPO: "https://github.com/koala73/worldmonitor.git"
  _APP_SOURCE_REF: "main"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:latest"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:latest"

steps:
  # 1. Fetch the application source (skip if the build already runs in the app repo).
  - id: fetch-source
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    args:
      - -c
      - |
        if [ ! -f Dockerfile ] && [ ! -f app/Dockerfile ]; then
          git clone --depth 1 --branch "${_APP_SOURCE_REF}" "${_APP_SOURCE_REPO}" app-src
        else
          mkdir -p app-src && cp -r . app-src
        fi

  # 2. Build the app image (frontend + api + MCP).
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: app-src
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:latest"
      - .

  # 3. Push to Artifact Registry (also handled by `images:` but explicit for ordering).
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app"

  # 4. Build the private AI worker image from this repo's workers/ directory.
  - id: build-worker
    name: gcr.io/cloud-builders/docker
    dir: workers
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:latest"
      - .

  # 5. Deploy the new images to Cloud Run (the app services share one image).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        for svc in uvm-frontend uvm-backend uvm-websocket uvm-auth; do
          gcloud run deploy "$svc" \
            --region "${_REGION}" \
            --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app:${SHORT_SHA}" \
            --quiet
        done
        gcloud run deploy uvm-ai-worker \
          --region "${_REGION}" \
          --image "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/worker:${SHORT_SHA}" \
          --quiet

# Infrastructure changes (gcp/terraform) are applied by a separate Terraform
# pipeline / manual `terraform apply` — kept out of the image build so app
# deploys stay fast and infra changes stay reviewable.
